events {
    worker_connections 1024;
}

http {
    # Dynamic CORS origin mapping for local, nip.io LAN, and dev ports
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:(3000|5173|8080)$" $http_origin;
        "~^https://.*\.nip\.io:8443$" $http_origin;
        "~^https://localhost:8443$" $http_origin;
    }

    # Upstream services
    upstream vero_frontend     { server 127.0.0.1:3000; }
    upstream vero_auth         { server 127.0.0.1:8001; }
    upstream vero_board        { server 127.0.0.1:8002; }
    upstream vero_notes        { server 127.0.0.1:8003; }
    upstream vero_project      { server 127.0.0.1:8004; }
    upstream vero_chat         { server 127.0.0.1:8005; }
    upstream vero_notification { server 127.0.0.1:8006; }
    upstream vero_meet         { server 127.0.0.1:8007; }

    server {
        # HTTPS server on port 8443
        listen 8443 ssl;
        server_name localhost *.nip.io;
        
        ssl_certificate certs/nginx-selfsigned.crt;
        ssl_certificate_key certs/nginx-selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Frontend (Vite Dev Server + HMR WebSockets)
        location / {
            proxy_pass http://vero_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth Service
        location /api/auth/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_auth/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Better Auth Routes
        location /api/better-auth/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_auth/better-auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # User Service (auth-service)
        location /api/user/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_auth/user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal Verify
        location /api/internal/ {
            proxy_pass http://vero_auth/internal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Project Service
        location /api/project/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_project/project/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Chat Service (WebSocket/Socket.io)
        location /api/chat/ {
            proxy_pass http://vero_chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Notification Service (WebSocket/Socket.io)
        location /api/notifications/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_notification/notifications/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Board Service
        location /api/board/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_board/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notes Service (Yjs Collaboration WebSockets)
        location /api/notes/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://vero_notes/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Meet Service (WebRTC SFU & Socket.io)
        location /api/meet/ {
            proxy_pass http://vero_meet/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }
    }
}
