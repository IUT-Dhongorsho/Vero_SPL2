events {
    worker_connections 1024;
}

http {
    upstream auth_service { server auth-service:8001; }
    upstream board_service { server board-service:8002; }
    upstream notes_service { server notes-service:8003; }
    upstream project_service { server project-service:8004; }
    upstream chat_service { server chat-service:8005; }
    upstream notification_service { server notification-service:8006; }

    server {
        listen 80;
        
        # Global CORS Setup
        add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle Preflight OPTIONS requests globally
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Cache-Control' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Better Auth Routes
        location /api/better-auth/ {
            proxy_pass http://auth_service/better-auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # User Service (currently in auth-service)
        location /api/user/ {
            proxy_pass http://auth_service/user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal Verify
        location /api/internal/ {
            proxy_pass http://auth_service/internal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Project Service
        location /api/project/ {
            proxy_pass http://project_service/project/;
            proxy_set_header Host $host;
        }

        # Chat Service (with WebSocket support)
        location /api/chat/ {
            proxy_pass http://chat_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Notifications
        location /api/notifications/ {
            proxy_pass http://notification_service/notifications/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
        
        # Board Service
        location /api/board/ {
            proxy_pass http://board_service/;
            proxy_set_header Host $host;
        }

        # Notes Service
        location /api/notes/ {
            proxy_pass http://notes_service/;
            proxy_set_header Host $host;
        }
    }
}
