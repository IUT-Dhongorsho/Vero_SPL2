syntax = "proto3";

package chat;

service ChatService {
  rpc CreateChannel (CreateChannelRequest) returns (ChannelResponse);
  rpc AddMembers (AddMembersRequest) returns (ChannelResponse);
}

message CreateChannelRequest {
  string name = 1;
  string type = 2; // direct, group, public
  string externalId = 3; // project or module id
  string workspaceId = 4;
}

message AddMembersRequest {
  string channelId = 1;
  repeated string userIds = 2;
}

message ChannelResponse {
  string id = 1;
  string name = 2;
  string type = 3;
  string externalId = 4;
  bool success = 5;
  string message = 6;
}
